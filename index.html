<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Echo-Dash: Ghost Protocol v40</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #010105; display: flex; flex-direction: column; align-items: center; color: #0ff; font-family: 'Courier New', monospace; overflow: hidden; }
        .ui { padding: 15px; margin-top: 10px; width: 950px; display: flex; justify-content: space-between; align-items: center; background: rgba(0, 40, 100, 0.4); border: 1px solid #0ff; border-radius: 12px; }
        canvas { border: 2px solid #0ff; background: #050510; margin-top: 10px; box-shadow: 0 0 40px rgba(0,255,255,0.2); }
        .ability-bar { width: 100px; height: 8px; background: #111; border: 1px solid #0ff; margin-top: 4px; border-radius: 4px; }
        .fill { height: 100%; background: #0ff; width: 0%; transition: width 0.2s; }
        select { background: #000; color: #0ff; border: 1px solid #0ff; padding: 5px; cursor: pointer; font-family: inherit; }
        #winScreen, #leaderboard { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0, 5, 20, 0.95); padding: 40px; border: 2px solid #0ff; text-align: center; display: none; z-index: 1000; border-radius: 20px; }
        table { width: 100%; color: #0ff; border-collapse: collapse; margin: 20px 0; }
        th, td { padding: 10px; border-bottom: 1px solid rgba(0,255,255,0.2); }
        input { background: #111; border: 1px solid #0ff; color: #0ff; padding: 10px; margin-bottom: 20px; outline: none; }
        button { padding: 10px 20px; background: #0ff; border: none; color: #000; font-weight: bold; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="ui">
        <div>
            <label>SECTOR:</label>
            <select id="sectorSelect" onchange="changeSector()">
                <option value="1">1: The Gate</option>
                <option value="2">2: Precision Path</option>
                <option value="3">3: Precision Gauntlet (Long)</option>
                <option value="4">4: Vertical Ascent</option>
                <option value="5">5: Ghost Protocol</option>
            </select>
            <div style="color: #f0f; font-weight: bold; margin-top:5px;">TIME: <span id="gameTimer">0.00</span>s <span id="spawnShield" style="color:#fff; font-size:0.7em;"></span></div>
        </div>
        
        <div style="display: flex; gap: 40px;">
            <div style="text-align:center">
                <span style="font-size: 0.6em;">[E] DASH</span>
                <div class="ability-bar"><div id="dashFill" class="fill"></div></div>
            </div>
            <div style="text-align:center">
                <span style="font-size: 0.6em;">[SPACE] GHOST</span>
                <div id="recStatus" style="font-size: 0.8em; color: #0ff; font-weight: bold;">IDLE</div>
            </div>
        </div>

        <div style="text-align: right;">
            <button onclick="showLeaderboard()">ARCHIVE</button>
            <div id="gateText" style="color:#f00; font-size: 0.8em; font-weight: bold; margin-top:5px;">GATE: LOCKED</div>
        </div>
    </div>

    <canvas id="gameCanvas" width="950" height="500"></canvas>

    <div id="winScreen">
        <h1 style="color:#0ff;">SECTOR COMPLETE</h1>
        <p id="finalTimeMsg" style="font-size: 1.5em; color: #f0f;"></p>
        <input type="text" id="playerName" placeholder="OPERATIVE ID" maxlength="12"><br>
        <button onclick="submitFinalScore()">UPLOAD SCORE</button>
    </div>

    <div id="leaderboard">
        <h2 id="lbTitle" style="color:#0ff;">ARCHIVE</h2>
        <table>
            <thead><tr><th>RANK</th><th>NAME</th><th>TIME</th></tr></thead>
            <tbody id="leaderboardBody"></tbody>
        </table>
        <button onclick="document.getElementById('leaderboard').style.display='none'">RETURN</button>
    </div>

<script>
const dbUrl = 'https://mcsvkoximpddloruvydg.supabase.co';
const dbKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jc3Zrb3hpbXBkZGxvcnV2eWRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NTcwMDAsImV4cCI6MjA5MDIzMzAwMH0.gRr6i-O5nNzrd0se0pe2OMehFT9F7qM8yXAIFtqIqos';
const db = supabase.createClient(dbUrl, dbKey);

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const keys = {};

const sectors = {
    1: { startX: 100, startY: 800, endX: 2600 }, 
    2: { startX: 2650, startY: 700, endX: 3850 }, 
    3: { startX: 3800, startY: 700, endX: 5250 }, 
    4: { startX: 5200, startY: 600, endX: 6200 },
    5: { startX: 6300, startY: 200, endX: 8600 }
};

let currentSector = 1;
let startTime = Date.now(), isGameOver = false, lastDash = 0, spawnTime = 0;
let player = { x: 100, y: 800, w: 30, h: 30, vx: 0, vy: 0, grounded: false, recording: false, history: [] };
let echo = { active: false, x: 0, y: 0, history: [], frameIdx: 0 };
let camera = { x: 0, y: 0 };

const platforms = [
    // Sector 1: Restored to original difficulty
    {x: 0, y: 900, w: 800, h: 100}, {x: 900, y: 800, w: 200, h: 20}, {x: 1200, y: 700, w: 200, h: 20}, 
    {x: 1550, y: 700, w: 50, h: 20}, {x: 1850, y: 650, w: 50, h: 20}, {x: 2200, y: 800, w: 400, h: 100},
    // Sector 2: Precision
    {x: 2600, y: 800, w: 150, h: 20}, {x: 2800, y: 700, w: 60, h: 20}, {x: 3100, y: 600, w: 60, h: 20}, {x: 3450, y: 550, w: 60, h: 20},
    // Sector 3: Long Precision (Mirroring S2 difficulty but 2x scale)
    {x: 3800, y: 750, w: 200, h: 20}, {x: 4050, y: 650, w: 60, h: 20}, {x: 4250, y: 750, w: 60, h: 20}, 
    {x: 4450, y: 650, w: 60, h: 20}, {x: 4650, y: 750, w: 60, h: 20}, {x: 4850, y: 650, w: 60, h: 20}, {x: 5050, y: 750, w: 250, h: 20},
    // Sector 4
    {x: 5200, y: 650, w: 200, h: 20}, {x: 5600, y: 550, w: 5, h: 10}, {x: 5600, y: 400, w: 40, h: 10}, {x: 5600, y: 250, w: 40, h: 10}, {x: 5605, y: 100, w: 40, h: 10},  {x: 5610, y: -50, w: 40, h: 10}, {x: 5625, y: -200, w: 40, h: 10}, 
    // Sector 5: Boss Protocol
    {x: 6300, y: 300, w: 300, h: 20}, {x: 6800, y: 500, w: 100, h: 20}, {x: 7100, y: 650, w: 100, h: 20}, 
    {x: 7400, y: 800, w: 1200, h: 100}
];

const plates = [
    { x: 400, y: 890, w: 80, h: 10, pressed: false, targetGate: 0 },
    { x: 7500, y: 790, w: 80, h: 10, pressed: false, targetGate: 1 } 
];
const gates = [
    { x: 2550, y: 400, w: 30, h: 400, open: false }, 
    { x: 8400, y: 400, w: 30, h: 400, open: false }  
];
const guards = [
    { x: 2100, y: 750, range: 600, speed: 2.2 },
    { x: 4300, y: 700, range: 450, speed: 2.5 }, 
    { x: 7800, y: 750, range: 900, speed: 5.5 } // FAST GUARD
];

function changeSector() {
    currentSector = parseInt(document.getElementById('sectorSelect').value);
    resetSector();
}

function resetSector() {
    const s = sectors[currentSector];
    player.x = s.startX; player.y = s.startY;
    player.vx = 0; player.vy = 0;
    player.recording = false; echo.active = false;
    isGameOver = false;
    startTime = Date.now(); spawnTime = Date.now();
    document.getElementById('winScreen').style.display = 'none';
    document.getElementById('recStatus').innerText = "IDLE";
}

function die() { resetSector(); }

window.onkeydown = (e) => { 
    keys[e.code] = true;
    if(e.code === 'Space') {
        if(!player.recording && !echo.active) { player.recording = true; player.history = []; document.getElementById('recStatus').innerText = "🔴 REC"; }
        else if(player.recording) { player.recording = false; echo.active = true; echo.frameIdx = 0; echo.history = [...player.history]; document.getElementById('recStatus').innerText = "👻 ACTIVE"; }
        else { echo.active = false; document.getElementById('recStatus').innerText = "IDLE"; }
    }
    if(e.code === 'KeyE' && Date.now() - lastDash > 2500) { player.vx = (keys['KeyA'] || keys['ArrowLeft']) ? -28 : 28; lastDash = Date.now(); }
};
window.onkeyup = (e) => keys[e.code] = false;

function update() {
    if (isGameOver) return;
    let now = Date.now();
    let immunityLeft = Math.max(0, 2000 - (now - spawnTime));
    document.getElementById('gameTimer').innerText = ((now - startTime) / 1000).toFixed(2);
    document.getElementById('dashFill').style.width = Math.min(100, ((now - lastDash) / 2500) * 100) + "%";
    document.getElementById('spawnShield').innerText = immunityLeft > 0 ? "[SHIELD]" : "";

    player.vx *= 0.85;
    if (keys['KeyA'] || keys['ArrowLeft']) player.vx -= 0.8;
    if (keys['KeyD'] || keys['ArrowRight']) player.vx += 0.8;
    player.vy += 0.8;

    player.grounded = false;
    let collidables = [...platforms, ...gates.filter(g => !g.open)];
    collidables.forEach(p => {
        if(player.x < p.x + p.w && player.x + player.w > p.x && player.y + player.h + player.vy > p.y && player.y + player.vy < p.y + p.h) {
            if(player.vy > 0) { player.y = p.y - player.h; player.vy = 0; player.grounded = true; }
        }
        if(player.x + player.vx < p.x + p.w && player.x + player.w + player.vx > p.x && player.y < p.y + p.h && player.y + player.h > p.y) player.vx = 0;
    });

    player.x += player.vx; player.y += player.vy;
    if (player.grounded && (keys['KeyW'] || keys['ArrowUp'])) player.vy = -16;
    if (player.y > 1200) die();

    if(player.recording) player.history.push({x: player.x, y: player.y});
    if(echo.active) {
        echo.frameIdx++;
        if(echo.frameIdx < echo.history.length) { echo.x = echo.history[echo.frameIdx].x; echo.y = echo.history[echo.frameIdx].y; }
        else { echo.active = false; document.getElementById('recStatus').innerText = "IDLE"; }
    }

    plates.forEach(p => {
        p.pressed = echo.active && Math.hypot(echo.x - (p.x + p.w/2), echo.y - (p.y + p.h/2)) < 60;
        gates[p.targetGate].open = p.pressed;
    });

    let activeGate = (currentSector === 1) ? gates[0] : (currentSector === 5) ? gates[1] : null;
    if(activeGate) {
        document.getElementById('gateText').innerText = activeGate.open ? "GATE: OPEN" : "GATE: LOCKED";
        document.getElementById('gateText').style.color = activeGate.open ? "#0f0" : "#f00";
    } else { document.getElementById('gateText').innerText = ""; }

    guards.forEach(g => {
        let dP = Math.hypot(player.x - g.x, player.y - g.y);
        let dE = echo.active ? Math.hypot(echo.x - g.x, echo.y - g.y) : 9999;
        let target = (echo.active && dE < dP) ? echo : player;
        if (Math.hypot(target.x - g.x, target.y - g.y) < g.range) {
            g.x += (target.x > g.x) ? g.speed : -g.speed;
            g.y += (target.y > g.y) ? g.speed * 0.3 : -g.speed * 0.3;
        }
        if (dP < 30 && immunityLeft <= 0) die();
    });

    if(player.x > sectors[currentSector].endX) { 
        isGameOver = true; document.getElementById('winScreen').style.display = "block"; 
        document.getElementById('finalTimeMsg').innerText = document.getElementById('gameTimer').innerText + "s";
    }

    camera.x += (player.x - canvas.width/2 - camera.x) * 0.1;
    camera.y += (player.y - canvas.height/2 - camera.y) * 0.1;
}

function draw() {
    update();
    ctx.globalAlpha = 1.0; ctx.fillStyle = "#050510"; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.save(); ctx.translate(-camera.x, -camera.y);

    platforms.forEach(p => { ctx.fillStyle = "#1a1a3a"; ctx.fillRect(p.x, p.y, p.w, p.h); ctx.strokeStyle = "#0ff"; ctx.strokeRect(p.x, p.y, p.w, p.h); });
    plates.forEach(p => { ctx.fillStyle = p.pressed ? "#0f0" : "#f0f"; ctx.fillRect(p.x, p.y, p.w, p.h); });
    gates.forEach(g => { if(!g.open) { ctx.fillStyle = "rgba(255,0,0,0.8)"; ctx.fillRect(g.x, g.y, g.w, g.h); } });
    
    ctx.shadowBlur = 15;
    guards.forEach(g => { ctx.shadowColor = "#f00"; ctx.font = "40px Arial"; ctx.fillText("👾", g.x, g.y); });
    if(echo.active) { ctx.globalAlpha = 0.9; ctx.shadowColor = "#f0f"; ctx.font = "45px Arial"; ctx.fillText("👻", echo.x, echo.y+30); }
    
    let now = Date.now();
    ctx.globalAlpha = (Math.max(0, 2000 - (now - spawnTime)) > 0 && Math.floor(now/100) % 2 === 0) ? 0.3 : 1.0;
    ctx.shadowColor = "#0ff"; ctx.font = "45px Arial"; ctx.fillText(player.recording ? "🔴" : "🤖", player.x, player.y+30);
    
    ctx.globalAlpha = 1.0; ctx.strokeStyle = "#f0f"; ctx.setLineDash([10, 10]);
    ctx.beginPath(); ctx.moveTo(sectors[currentSector].endX, 0); ctx.lineTo(sectors[currentSector].endX, 1000); ctx.stroke();
    
    if (currentSector === 5) { ctx.shadowColor = "#fff"; ctx.fillText("💎", 8500, 750); }

    ctx.restore();
    requestAnimationFrame(draw);
}

async function submitFinalScore() {
    const name = document.getElementById('playerName').value || 'Anon';
    const timeVal = parseFloat(document.getElementById('gameTimer').innerText);
    await db.from('leaderboard').insert([{ player_name: name, time_taken: timeVal, sector: currentSector }]);
    document.getElementById('winScreen').style.display = 'none'; showLeaderboard(); 
}

async function showLeaderboard() {
    document.getElementById('lbTitle').innerText = "SECTOR " + currentSector + " ARCHIVE";
    document.getElementById('leaderboard').style.display = 'block';
    const { data } = await db.from('leaderboard').select('*').eq('sector', currentSector).order('time_taken', {ascending: true}).limit(10);
    document.getElementById('leaderboardBody').innerHTML = data ? data.map((d, i) => `<tr><td>#${i+1}</td><td>${d.player_name}</td><td>${d.time_taken}s</td></tr>`).join('') : "";
}

draw();
</script>
</body>
</html>
